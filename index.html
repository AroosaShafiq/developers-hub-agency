<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-slate-900">
    <nav class="">
      <div class="flex justify-between text-justify p-5">
        <div class="flex items-center gap-2">
          <div
            class="bg-gradient-to-tr from-cyan-500 to-blue-600 p-2 rounded-lg shadow-lg shadow-cyan-500/50"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6 text-slate-900"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"
              />
            </svg>
          </div>
          <span class="text-2xl font-black text-white">
            Developers<span class="text-cyan-400">Hub</span>
          </span>
        </div>
        <div
          id="menu-links"
          class="hidden md:block flex-col absolute top-20 left-0 w-auto z-50 md:static"
        >
          <a
            href=""
            class="text-white hover:text-cyan-400 hover:underline p-2 md:p-1 lg:p-5 hover:font-bold transition-all ease-in-out duration-200 hover:underline-offset-8 hover:decoration-2"
            >Home</a
          >
          <a
            href=""
            class="text-white hover:text-cyan-400 hover:underline p-2 md:p-1 lg:p-5 hover:font-bold transition-all ease-in-out duration-200 hover:underline-offset-8 hover:decoration-2"
            >About Us</a
          >
          <a
            href=""
            class="text-white hover:text-cyan-400 hover:underline p-2 md:p-1 lg:p-5 hover:font-bold transition-all ease-in-out duration-200 hover:underline-offset-8 hover:decoration-2"
            >Services</a
          >
          <a
            href=""
            class="text-white hover:text-cyan-400 hover:underline p-2 md:p-1 lg:p-5 hover:font-bold transition-all ease-in-out duration-200 hover:underline-offset-8 hover:decoration-2"
            >Portfolio</a
          >
          <a
            href=""
            class="text-white hover:text-cyan-400 hover:underline p-2 md:p-2 lg:p-5 hover:font-bold transition-all ease-in-out duration-200 hover:underline-offset-8 hover:decoration-2"
            >Contact</a
          >
          <button
            class="text-white hover:text-cyan-900 transition-all duration-300 ease-in-out bg-gradient-to-r from-[#0ecdaf] to-[#9938ca] rounded-lg px-2 ms-2 me-40 md:ms-0 md:me-0 lg:px-5 md:px-2 border border-2 border:bg-gradient-to-r from-[#0ecdaf] to-[#9938ca]"
          >
            Book Meeting
          </button>
        </div>
        <button id="menu-btn" class="md:hidden block focus:outline-none p-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#faf9fa"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-menu-icon lucide-menu"
          >
            <path d="M4 5h16" />
            <path d="M4 12h16" />
            <path d="M4 19h16" />
          </svg>
        </button>
      </div>
    </nav>
    <script>
      const btn = document.getElementById("menu-btn");
      const menu = document.getElementById("menu-links");

      // Click karne par menu khulne/band hone ke liye
      btn.addEventListener("click", () => {
        menu.classList.toggle("hidden");
        menu.classList.toggle("flex");
      });

      // Jab kisi link par click ho, to menu band ho jaye (Mobile ke liye)
      const links = menu.querySelectorAll("a");
      links.forEach((link) => {
        link.addEventListener("click", () => {
          if (window.innerWidth < 768) {
            menu.classList.add("hidden");
          }
        });
      });
    </script>
  </body>
</html>
